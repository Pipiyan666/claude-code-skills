# xcodegen 配置文件 — 一键生成 IdeaCapsule.xcodeproj
#
# 用法（装好 xcodegen 后）：
#   brew install xcodegen
#   cd ios_app
#   xcodegen generate
#   open IdeaCapsule.xcodeproj
#
# 这样你就不用手动在 Xcode 里 File → New Project → 拖文件了。

name: IdeaCapsule
options:
  bundleIdPrefix: com.ideacapsule
  deploymentTarget:
    iOS: "26.0"      # FoundationModels 需要 iOS 26+
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    DEVELOPMENT_LANGUAGE: zh-Hans
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  IdeaCapsule:
    type: application
    platform: iOS
    sources:
      - path: IdeaCapsule
        excludes:
          - "ShareExtension"   # Share Extension 是单独 target
          - "Resources/Info.plist"
    resources:
      - IdeaCapsule/Resources
    info:
      path: IdeaCapsule/Resources/Info.plist
    dependencies:    dependencies: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ideacapsule.app
        TARGETED_DEVICE_FAMILY: "1,2"    # iPhone + iPad
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""              # 用户需要在 Xcode 里填自己的 Apple Developer Team

schemes:
  IdeaCapsule:
    build:
      targets:
        IdeaCapsule: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
